version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - finos-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      # Tell frontend to talk to backend via docker internal network
      - API_URL_PREDICT=http://backend:8000/api/predict
      - API_URL_BACKTEST=http://backend:8000/api/playground/backtest
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - finos-network

networks:
  finos-network:
    driver: bridge
